# Telemetry Replay Settings
# Edit values here or change them in the widget configure screen.
# Invalid values are replaced with defaults on next load.

speed = 1  # values: 0.25, 0.5, 1, 2, 3, 4, 5
loop = false  # values: true, false
startOffsetSec = 0  # range: 0 - 3600
format = auto  # values: auto, edgetx, generic
maxSensorRate = 5  # values: 0.5, 1, 2, 5
fileIndex = 1  # range: 1 - 9999
gpsFormat = decimal  # values: decimal, dms
altUnit = m  # values: m, ft
speedUnit = kmh  # values: kmh, ms, knots
vspdUnit = ms  # values: ms, fts
attitudeUnit = rad  # values: rad, deg
